syntax = "proto3";
option csharp_namespace = "MotionCapture.Grpc.Contracts.Motion";
package motion;

message CameraFrame {
    int32 camera_index = 1;
    int64 timestamp_ms = 2;
    bytes image = 3;
}

message Joint2D {
    string name = 1;
    int32 parent_index = 2;
    float x = 3;
    float y = 4;
    float depth = 5;
    bool is_visible = 6;
}
    
message FrameLandmarks2D {
    repeated Joint2D joints2d = 1;
    int32 source_camera_index = 2;
    int64 timestamp_ms = 3;
}

message JointPosition3D {
    string name = 1;
    int32 parent_index = 2;
    float pos_x = 3;
    float pos_y = 4;
    float pos_z = 5;
}

message MotionRequest {
    repeated CameraFrame frames = 1;
}

message MotionResponse {
    repeated JointPosition3D joints = 1;
    repeated FrameLandmarks2D frames_to_draw = 2;
}
